services:
  db:
    image: mysql:8.4
    container_name: encuestas-jsp-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-encuestas}
      MYSQL_USER: ${MYSQL_USER:-encuestas}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-encuestas}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    # El esquema lo aplican las migraciones al arrancar la aplicación
    # (src/main/resources/db/migration); el contenedor solo crea la base vacía.
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: encuestas-jsp-web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # La app se conecta al contenedor de MySQL por el nombre del servicio (db).
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: ${MYSQL_DATABASE:-encuestas}
      DB_USER: ${MYSQL_USER:-encuestas}
      DB_PASSWORD: ${MYSQL_PASSWORD:-encuestas}
      APP_ENV: Production
      # Con APP_TOKEN_SECRET vacío, la app genera y rota sus claves de firma en
      # APP_KEYS_DIR (persistido en el volumen web-keys).
      APP_TOKEN_SECRET: ${APP_TOKEN_SECRET:-}
      APP_KEYS_DIR: /var/lib/encuestas
    ports:
      - "${WEB_PORT:-8080}:8080"
    volumes:
      - web-keys:/var/lib/encuestas
    # Orquestadores (K8s, etc.) pueden usar la ruta HTTP /health como sonda de readiness/liveness.

volumes:
  db-data:
  web-keys:
